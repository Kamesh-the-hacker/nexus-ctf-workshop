<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS CTF ADMIN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
background:#050505;
color:#00f2ff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#0d0d0d;
border:1px solid #00f2ff;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,242,255,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #00f2ff;
background:#111;
color:#00f2ff;
}

button{
width:100%;
padding:12px;
border:none;
background:#00f2ff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 10px #00f2ff;
}

#reader{
width:100%;
margin-top:10px;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #00f2ff33;
padding:6px;
text-align:left;
}

.success-animation{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:#00ff9d;
z-index:999;
animation:fadeout 1.2s forwards;
}

@keyframes fadeout{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

</style>

</head>

<body>

<div class="container">

<h2>NEXUS CTF ADMIN</h2>

<div class="card">

<div id="login">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>


<div id="scanner" style="display:none">

<div id="reader"></div>

<div class="stats">

<div>Total: <span id="total">0</span></div>

<div>Checked: <span id="checked">0</span></div>

</div>

<button onclick="exportCSV()" style="margin-top:10px">
Export CSV
</button>

<h3>Checked In Users</h3>

<table id="table">

<thead>

<tr>
<th>Name</th>
<th>Roll</th>
<th>Dept</th>
<th>Time</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>


<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>


<script>

let scanner

async function login(){

const res = await fetch("/admin/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
username:user.value,
password:pass.value
})

})

const data = await res.json()

if(data.token){

localStorage.setItem("token",data.token)

document.getElementById("login").style.display="none"

document.getElementById("scanner").style.display="block"

setTimeout(startScanner,500)

loadStats()
loadTable()

}else{

alert(data.error)

}

}


function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{fps:10,qrbox:250},

onScanSuccess

)

}



async function onScanSuccess(text){

document.getElementById("beep").play()

const res = await fetch("/verify",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({qrCode:text})

})

const data = await res.json()

if(data.status==="success"){

showSuccess(data.name)

loadStats()
loadTable()

}

}


function showSuccess(name){

const div=document.createElement("div")

div.className="success-animation"

div.innerHTML="✔ "+name

document.body.appendChild(div)

setTimeout(()=>{

div.remove()

},1200)

}



async function loadStats(){

const res = await fetch("/stats")

const data = await res.json()

animateCounter("total",data.total)

animateCounter("checked",data.checked)

}



function animateCounter(id,value){

let start=0

let end=value

let step=Math.ceil(end/20)

let counter=setInterval(()=>{

start+=step

if(start>=end){

start=end

clearInterval(counter)

}

document.getElementById(id).innerText=start

},20)

}



async function loadTable(){

const res = await fetch("/attendance")

const users = await res.json()

const body=document.querySelector("#table tbody")

body.innerHTML=""

users.forEach(u=>{

body.innerHTML+=`

<tr>

<td>${u.name}</td>

<td>${u.rollNo}</td>

<td>${u.department}</td>

<td>${u.checkInTime}</td>

</tr>

`

})

}



function exportCSV(){

window.location="/export"

}

</script>

</body>

</html>
