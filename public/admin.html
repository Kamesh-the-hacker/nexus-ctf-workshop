<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CTF ADMIN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
background:#050505;
color:#00f2ff;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#0d0d0d;
border:1px solid #00f2ff;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,242,255,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #00f2ff;
background:#111;
color:#00f2ff;
}

button{
width:100%;
padding:12px;
border:none;
background:#00f2ff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00f2ff;
}

#reader{
margin-top:20px;
width:100%;
}

#result{
margin-top:15px;
padding:10px;
border-radius:6px;
text-align:center;
}

.success{
background:#003c2f;
color:#00ffae;
}

.error{
background:#3c0000;
color:#ff4c4c;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>NEXUS CTF ADMIN</h2>

<div class="card">

<div id="login">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

<div id="scanner" style="display:none">

<div id="reader"></div>

<div id="result"></div>

<div class="stats">
<div>Total Registered: <span id="total">0</span></div>
<div>Checked In: <span id="checked">0</span></div>
</div>

<button onclick="exportCSV()" style="margin-top:15px">
Export CSV
</button>

</div>

</div>

</div>

<script>

async function login(){

const res = await fetch("/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data = await res.json()

if(data.token){

localStorage.setItem("token",data.token)

document.getElementById("login").style.display="none"
document.getElementById("scanner").style.display="block"

startScanner()
loadStats()

}else{
alert(data.error)
}

}

function startScanner(){

const qr = new Html5Qrcode("reader")

qr.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
onScanSuccess
)

}

async function onScanSuccess(decodedText){

const res = await fetch("/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ qrCode:decodedText })
})

const data = await res.json()

const result = document.getElementById("result")

if(data.status==="success"){

result.className="success"
result.innerHTML="✔ "+data.name+" Checked In"

loadStats()

}else if(data.status==="already"){

result.className="error"
result.innerHTML="⚠ Already Scanned"

}else{

result.className="error"
result.innerHTML="✖ Invalid QR"

}

}

async function loadStats(){

const res = await fetch("/stats")
const data = await res.json()

document.getElementById("total").innerText=data.total
document.getElementById("checked").innerText=data.checked

}

function exportCSV(){

window.location="/export"

}

</script>

</body>
</html>
